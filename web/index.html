<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Centering Analyzer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { --bg:#14161a; --card:#1e2128; --ink:#e8e6e1; --dim:#9a9790;
          --gold:#d4af37; --ok:#6fcf7c; --warn:#e8b24a; --bad:#e06c5c; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.5 system-ui, "Segoe UI", sans-serif;
         background:var(--bg); color:var(--ink); }
  .wrap { max-width:1080px; margin:0 auto; padding:28px 20px 60px; }
  h1 { font-size:22px; letter-spacing:.04em; }
  h1 span { color:var(--gold); }
  .panel { background:var(--card); border-radius:12px; padding:20px;
           margin-top:16px; }
  .modes { display:flex; gap:10px; flex-wrap:wrap; }
  .modes label { padding:8px 16px; border:1px solid #3a3f4a; border-radius:8px;
                 cursor:pointer; user-select:none; }
  .modes input { display:none; }
  .modes input:checked + span { color:var(--gold); font-weight:600; }
  .modes label:has(input:checked) { border-color:var(--gold); }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px; }
  @media (max-width:720px){ .grid { grid-template-columns:1fr; } }
  .drop { border:2px dashed #3a3f4a; border-radius:10px; padding:18px;
          text-align:center; cursor:pointer; min-height:120px; }
  .drop.has { border-color:var(--ok); }
  .drop img { max-width:100%; max-height:180px; border-radius:6px; }
  .drop .hint { color:var(--dim); font-size:13px; }
  input[type=text] { width:100%; padding:10px 12px; border-radius:8px;
      border:1px solid #3a3f4a; background:#14161a; color:var(--ink); font-size:15px; }
  button { margin-top:16px; padding:12px 28px; font-size:16px; font-weight:600;
      border:0; border-radius:8px; background:var(--gold); color:#14161a;
      cursor:pointer; }
  button:disabled { opacity:.5; cursor:wait; }
  .err { color:var(--bad); margin-top:12px; white-space:pre-wrap; }
  .bigline { font-size:30px; font-weight:700; margin:4px 0; }
  .bigline small { font-size:15px; color:var(--dim); font-weight:400; }
  table { border-collapse:collapse; margin-top:8px; width:100%; }
  td, th { text-align:left; padding:4px 12px 4px 0; color:var(--ink);
           border-bottom:1px solid #2a2e37; font-size:14px; }
  th { color:var(--dim); font-weight:500; }
  .qa { margin:6px 0 0; padding:0; list-style:none; }
  .qa li.info { border-left-color:#7aa7d9; }
  .qa li { padding:6px 10px; border-left:3px solid var(--warn);
           background:#262a33; border-radius:0 6px 6px 0; margin-top:6px;
           font-size:13px; }
  .refused { color:var(--bad); }
  .meas { color:var(--ok); }
  .ovl { margin-top:10px; }
  .ovl img { width:100%; border-radius:8px; }
  .path { color:var(--dim); font-size:12px; word-break:break-all; }
  #spin { display:none; margin-top:14px; color:var(--dim); }
  #spin.on { display:block; }
</style>
</head>
<body>
<div class="wrap">
  <h1>CARD <span>CENTERING</span> ANALYZER</h1>

  <div class="panel">
    <div class="modes" id="modes">
      <label><input type="radio" name="mode" value="card" checked><span>Front + Back (full report)</span></label>
      <label><input type="radio" name="mode" value="back"><span>Back only</span></label>
      <label><input type="radio" name="mode" value="front"><span>Front only</span></label>
    </div>

    <div class="grid">
      <div id="frontBox">
        <strong>Front photo</strong>
        <div class="drop" id="dropFront"><span class="hint">Click or drop a photo<br>(HEIC / JPG / PNG)</span></div>
        <div style="margin-top:10px">
          <strong>Card ID</strong> <span class="hint">e.g. 8-210, C2-6, P1-42, or a unique name</span>
          <input type="text" id="cardId" placeholder="8-210">
          <div id="detect" class="hint" style="margin-top:6px"></div>
        </div>
      </div>
      <div id="backBox">
        <strong>Back photo</strong> <span class="hint">(gold frame side)</span>
        <div class="drop" id="dropBack"><span class="hint">Click or drop a photo<br>(HEIC / JPG / PNG)</span></div>
      </div>
    </div>

    <button id="go">Analyze</button>
    <div id="spin">Analyzing&hellip; first front analysis downloads the official render (a few seconds).</div>
    <div class="err" id="err"></div>
  </div>

  <div id="results"></div>
</div>

<input type="file" id="fpick" accept="image/*,.heic,.HEIC" style="display:none">

<script>
const state = { back: null, front: null };
let pickTarget = null;
const $ = (id) => document.getElementById(id);

function wireDrop(id, role) {
  const el = $(id);
  el.addEventListener('click', () => { pickTarget = role; $('fpick').value = ''; $('fpick').click(); });
  el.addEventListener('dragover', e => e.preventDefault());
  el.addEventListener('drop', e => { e.preventDefault();
    if (e.dataTransfer.files[0]) setFile(role, e.dataTransfer.files[0]); });
}
wireDrop('dropBack', 'back');
wireDrop('dropFront', 'front');
$('fpick').addEventListener('change', e => {
  if (e.target.files[0] && pickTarget) setFile(pickTarget, e.target.files[0]);
});

function setFile(role, file) {
  state[role] = file;
  const el = role === 'back' ? $('dropBack') : $('dropFront');
  el.classList.add('has');
  const isHeic = /\.heic$/i.test(file.name);
  el.innerHTML = '';
  if (isHeic) {
    el.textContent = file.name + ' (' + (file.size/1e6).toFixed(1) + ' MB)';
  } else {
    const img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    el.appendChild(img);
    el.appendChild(Object.assign(document.createElement('div'), {textContent: file.name, className: 'hint'}));
  }
  if (role === 'front' && mode() !== 'back') {
    cardIdTouched = false;      // new card: prior id/manual edit no longer applies
    detectCard(file);
  }
}

function mode() { return document.querySelector('input[name=mode]:checked').value; }
function syncBoxes() {
  const m = mode();
  $('backBox').style.display  = (m === 'front') ? 'none' : '';
  $('frontBox').style.display = (m === 'back')  ? 'none' : '';
}
$('modes').addEventListener('change', syncBoxes);
syncBoxes();

// --- automatic card-ID detection from the front photo ---
let cardIdTouched = false;               // don't clobber a manual entry
$('cardId').addEventListener('input', () => { cardIdTouched = true; });

async function detectCard(file) {
  const el = $('detect');
  if (!cardIdTouched) $('cardId').value = '';   // clear a stale id from a previous card
  el.style.color = 'var(--dim)';
  el.textContent = 'Detecting card\u2026';
  try {
    const data = await b64(file);
    const r = await fetch('/api/detect', { method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ photo: { name: file.name, data } }) });
    const out = await r.json();
    if (!r.ok) throw new Error(out.error || ('server error ' + r.status));
    applyDetection(out);
  } catch (e) {
    el.style.color = 'var(--dim)';
    el.textContent = 'Auto-detect unavailable (' + e.message + '). Enter the card ID manually.';
  }
}

function applyDetection(d) {
  const el = $('detect');
  if (d.card_id && !cardIdTouched) $('cardId').value = d.card_id;   // autofill
  const label = (d.card_id || '') + (d.display ? ' \u2014 ' + d.display : '');
  if (d.confidence === 'high') {
    el.style.color = 'var(--ok)';
    el.textContent = '\u2713 Detected ' + label;
  } else if (d.confidence === 'low' && d.card_id) {
    el.style.color = 'var(--warn)';
    el.textContent = '\u26a0 Best guess ' + label + ' \u2014 please verify.';
  } else {
    el.style.color = 'var(--warn)';
    el.textContent = "Couldn't identify the card automatically \u2014 enter the card ID.";
  }
}

function b64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

const fmt = (v, d=3) => v == null ? '—' : Number(v).toFixed(d);

function measRow(name, m, unit) {
  if (!m) return '';
  if (m.status !== 'measured')
    return `<tr><th>${name}</th><td class="refused" colspan="2">refused — ${m.refusal_reason||''}</td></tr>`;
  const u = m.uncertainty ? ` ± ${fmt(m.uncertainty.total)}` : '';
  return `<tr><th>${name}</th><td class="meas">${fmt(m.value)}${u} ${unit||m.unit||''}</td>
          <td class="hint">${m.uncertainty ? 'stat '+fmt(m.uncertainty.statistical)+' · persp '+fmt(m.uncertainty.perspective)+' · edge '+fmt(m.uncertainty.edge_definition) : ''}</td></tr>`;
}

function ratioBlock(label, r) {
  if (!r) return '';
  if (r.status !== 'measured')
    return `<div class="bigline refused">${label}: refused</div><div class="hint">${r.refusal_reason||''}</div>`;
  const u = r.uncertainty_pts ? ` ± ${Number(r.uncertainty_pts.total).toFixed(1)} pts` : '';
  return `<div class="bigline">${label}: ${r.display} <small>(${Number(r.first_pct).toFixed(1)}%${u})</small></div>`;
}

function tiltLine(t) {
  if (!t) return '';
  const parts = [];
  if (t.total_deg != null) parts.push(`tilt ${t.total_deg}° (pitch ${t.pitch_deg}°, yaw ${t.yaw_deg}°)`);
  if (t.keystone_w_pct != null) parts.push(`keystone W ${t.keystone_w_pct}%`);
  if (t.keystone_h_pct != null) parts.push(`keystone H ${t.keystone_h_pct}%`);
  if (t.focal_mm_equiv != null) parts.push(`f≈${t.focal_mm_equiv}mm eq`);
  parts.push(t.corrected ? 'perspective corrected' : 'partial correction (see notes)');
  return `<div class="hint">${parts.join(' · ')}</div>`;
}

function qaList(arr) {
  if (!arr || !arr.length) return '';
  return '<ul class="qa">' + arr.map(q => `<li class="${q.severity||'warning'}"><b>${q.code}</b> — ${q.message}</li>`).join('') + '</ul>';
}

function faceBack(d) {
  const res = d.result;
  return `<div class="panel"><h2>Back</h2>
    ${ratioBlock('L/R', res.ratio_lr)} ${ratioBlock('T/B', res.ratio_tb)}
    <table>${['left','right','top','bottom'].map(s => measRow(s+' border', res.borders_mm[s], 'mm')).join('')}</table>
    ${tiltLine(d.tilt)} ${qaList(d.qa)}</div>`;
}

function faceFront(d) {
  const res = d.result;
  const dir = (m, pos, neg) => m && m.status === 'measured' ? (m.value >= 0 ? pos : neg) : '';
  return `<div class="panel"><h2>Front (borderless)</h2>
    ${res.shift_mm.x && res.shift_mm.x.status==='measured' ? `<div class="bigline">${Math.abs(res.shift_mm.x.value).toFixed(3)}mm <small>print shift toward ${dir(res.shift_mm.x,'right','left')} edge</small></div>` : ratioBlock('X', {status:'refused', refusal_reason: res.shift_mm.x ? res.shift_mm.x.refusal_reason : ''})}
    ${res.shift_mm.y && res.shift_mm.y.status==='measured' ? `<div class="bigline">${Math.abs(res.shift_mm.y.value).toFixed(3)}mm <small>print shift toward ${dir(res.shift_mm.y,'bottom','top')} edge</small></div>` : ''}
    ${ratioBlock('Equivalent L/R', res.equivalent_ratio_lr)} ${ratioBlock('Equivalent T/B', res.equivalent_ratio_tb)}
    <table>${measRow('shift x', res.shift_mm.x, 'mm')}${measRow('shift y', res.shift_mm.y, 'mm')}</table>
    <div class="hint">${res.render ? `render match: ${res.render.n_inliers} inliers, ${res.render.median_reproj_px}px reprojection — ${(res.render.notes||[]).join('; ')}` : ''}</div>
    <div class="hint">${res.assumption||''}</div>
    ${tiltLine(d.tilt)} ${qaList(d.qa)}</div>`;
}

function render(out) {
  const d = out.result;
  let html = '';
  if (d.kind === 'card') {
    if (d.back) html += faceBack(d.back);
    if (d.front) html += faceFront(d.front);
    const rx = d.registration_mm && d.registration_mm.x;
    html += `<div class="panel"><h2>Cross-check</h2>
      ${rx ? measRowTable('front↔back registration x', rx) : ''}
      ${d.registration_mm && d.registration_mm.y ? measRowTable('registration y', d.registration_mm.y) : ''}
      <div class="hint">${d.mirror_consistency || ''}</div>${qaList(d.qa)}</div>`;
  } else if (d.kind === 'back') html += faceBack(d);
  else html += faceFront(d);

  for (const [role, ov] of Object.entries(out.overlays || {})) {
    html += `<div class="panel ovl"><h2>${role} verification overlay</h2>
      <img src="${ov.preview}"><div class="path">full-res: ${ov.path}</div></div>`;
  }
  html += `<div class="panel path">Full JSON + overlays saved to: ${out.saved_to}</div>`;
  $('results').innerHTML = html;
}
function measRowTable(name, m) { return `<table>${measRow(name, m, 'mm')}</table>`; }

$('go').addEventListener('click', async () => {
  $('err').textContent = '';
  $('results').innerHTML = '';
  const m = mode();
  const payload = { mode: m, card_id: $('cardId').value, photos: {} };
  try {
    if (m !== 'front') {
      if (!state.back) throw new Error('Select a back photo.');
      payload.photos.back = { name: state.back.name, data: await b64(state.back) };
    }
    if (m !== 'back') {
      if (!state.front) throw new Error('Select a front photo.');
      if (!$('cardId').value.trim()) throw new Error('Enter the card ID (e.g. 8-210) so the official render can be fetched.');
      payload.photos.front = { name: state.front.name, data: await b64(state.front) };
    }
  } catch (e) { $('err').textContent = e.message; return; }

  $('go').disabled = true; $('spin').classList.add('on');
  try {
    const r = await fetch('/api/analyze', { method: 'POST',
      headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
    const out = await r.json();
    if (!r.ok) throw new Error(out.error || ('server error ' + r.status));
    render(out);
  } catch (e) {
    $('err').textContent = e.message;
  } finally {
    $('go').disabled = false; $('spin').classList.remove('on');
  }
});
</script>
</body>
</html>
